name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bats:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run bats suite
        # Glob limits the run to tests/*.bats and skips tests/integration/,
        # whose smoke.bats builds the docker image end-to-end and is meant
        # for local execution rather than CI.
        run: bats tests/*.bats

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint launcher and entrypoint
        run: shellcheck claude-cask entrypoint.sh

  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
